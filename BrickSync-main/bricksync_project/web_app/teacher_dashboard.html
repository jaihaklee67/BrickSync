<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrickSync — 교사 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Noto Sans KR','Outfit',sans-serif}
body{background:#0f172a;color:#f1f5f9;min-height:100vh;display:flex}

/* 사이드바 */
.sidebar{width:240px;background:#1e293b;border-right:1px solid #334155;padding:24px 16px;display:flex;flex-direction:column;gap:8px;flex-shrink:0}
.sidebar-brand{font-size:1.4rem;font-weight:900;color:#facc15;padding:8px 12px;margin-bottom:16px}
.sidebar-brand span{font-size:.75rem;color:#64748b;font-weight:500;display:block;margin-top:2px}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;color:#94a3b8;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:#0f172a;color:#fff}
.nav-item.active{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff}
.nav-item i{width:18px;text-align:center}
.sidebar-bottom{margin-top:auto}
.teacher-badge{background:#0f172a;border-radius:10px;padding:12px;display:flex;align-items:center;gap:10px;margin-bottom:8px}
.teacher-badge .avatar{width:36px;height:36px;background:linear-gradient(135deg,#4f46e5,#9333ea);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.9rem;font-weight:900;flex-shrink:0}
.teacher-badge .info{overflow:hidden}
.teacher-badge .name{font-size:.85rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.teacher-badge .role-label{font-size:.72rem;color:#6366f1;font-weight:700}

/* 메인 */
.main{flex:1;padding:32px;overflow-y:auto}
.page-title{font-size:1.6rem;font-weight:900;margin-bottom:6px}
.page-subtitle{color:#64748b;font-size:.9rem;margin-bottom:28px}

/* 통계 카드 */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:32px}
.stat-card{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:20px}
.stat-card .label{color:#64748b;font-size:.8rem;font-weight:700;margin-bottom:8px}
.stat-card .value{font-size:2rem;font-weight:900;color:#fff}
.stat-card .sub{font-size:.75rem;color:#10b981;margin-top:4px}

/* 패널 */
.panel-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:1100px){.panel-grid{grid-template-columns:1fr}}

.panel{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:24px}
.panel-title{font-size:1rem;font-weight:800;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.panel-title i{color:#6366f1}

/* 코드 발급 */
.code-row{display:flex;gap:10px;margin-bottom:12px}
.code-input{flex:1;background:#0f172a;border:1.5px solid #334155;border-radius:8px;padding:10px 14px;color:#fff;font-size:.9rem;outline:none}
.code-input:focus{border-color:#6366f1}
.btn-issue{padding:10px 18px;background:#6366f1;border:none;border-radius:8px;color:#fff;font-weight:700;cursor:pointer;transition:.2s;white-space:nowrap}
.btn-issue:hover{background:#4f46e5}
.code-result{background:#0f172a;border:1.5px solid #334155;border-radius:10px;padding:14px;font-family:'Outfit',monospace;display:flex;align-items:center;justify-content:space-between;display:none}
.code-result.show{display:flex}
.code-value{font-size:1.3rem;font-weight:900;color:#facc15;letter-spacing:2px}
.btn-copy{padding:6px 14px;background:#334155;border:none;border-radius:6px;color:#94a3b8;font-size:.8rem;font-weight:700;cursor:pointer;transition:.2s}
.btn-copy:hover{background:#475569;color:#fff}

/* 학생 목록 */
.student-list{display:flex;flex-direction:column;gap:8px;max-height:320px;overflow-y:auto}
.student-item{display:flex;align-items:center;gap:12px;padding:10px 12px;background:#0f172a;border-radius:10px;border:1px solid #1e293b}
.student-item .avatar-s{width:32px;height:32px;background:linear-gradient(135deg,#0ea5e9,#6366f1);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:900;flex-shrink:0}
.student-item .s-name{font-weight:700;font-size:.9rem}
.student-item .s-class{font-size:.75rem;color:#64748b}
.student-item .s-status{margin-left:auto;font-size:.7rem;font-weight:700;padding:3px 8px;border-radius:20px}
.s-status.online{background:rgba(16,185,129,.15);color:#10b981}
.s-status.offline{background:rgba(100,116,139,.1);color:#64748b}
.btn-parent-code{margin-left:8px;padding:4px 10px;background:transparent;border:1px solid #334155;border-radius:6px;color:#94a3b8;font-size:.72rem;cursor:pointer;transition:.2s}
.btn-parent-code:hover{border-color:#6366f1;color:#a5b4fc}

.empty-state{text-align:center;padding:30px;color:#475569;font-size:.9rem}
.empty-state i{font-size:2rem;margin-bottom:10px;display:block}

/* 클래스 코드 목록 */
.class-list{display:flex;flex-direction:column;gap:8px}
.class-item{background:#0f172a;border-radius:10px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;border:1px solid #1e293b}
.class-code-badge{font-family:'Outfit',monospace;font-weight:900;color:#facc15;font-size:.95rem;letter-spacing:1px}
.class-info{font-size:.8rem;color:#64748b}
.class-count{font-size:.75rem;color:#6366f1;font-weight:700}

.loading{text-align:center;padding:20px;color:#64748b}
.loading i{animation:spin 1s linear infinite;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}

.toast{position:fixed;bottom:20px;right:20px;background:#1e293b;border:1px solid #334155;color:#f8fafc;padding:12px 20px;border-radius:10px;font-size:.85rem;font-weight:700;z-index:9999;transform:translateY(80px);transition:.3s;opacity:0}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{border-color:#10b981;color:#6ee7b7}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-brand">🧱 BrickSync <span>교사 관리 대시보드</span></div>
  <button class="nav-item active" onclick="showSection('overview')"><i class="fas fa-home"></i> 홈</button>
  <button class="nav-item" onclick="showSection('students')"><i class="fas fa-users"></i> 학생 관리</button>
  <button class="nav-item" onclick="showSection('classcodes')"><i class="fas fa-key"></i> 클래스 코드</button>
  <button class="nav-item" onclick="showSection('parentcodes')"><i class="fas fa-link"></i> 학부모 코드</button>
  <div class="sidebar-bottom">
    <div class="teacher-badge">
      <div class="avatar" id="sidebarAvatar">T</div>
      <div class="info">
        <div class="name" id="sidebarName">로딩 중...</div>
        <div class="role-label">교사 계정</div>
      </div>
    </div>
    <button class="nav-item" onclick="BrickSyncAuth.signOut()"><i class="fas fa-sign-out-alt"></i> 로그아웃</button>
  </div>
</aside>

<main class="main" id="mainContent">
  <div class="loading"><i class="fas fa-spinner"></i> 로딩 중...</div>
</main>

<div class="toast" id="toast"></div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="firebase_config.js"></script>
<script src="auth.js"></script>

<script>
let teacherProfile = null;
let teacherUid = null;
let currentSection = 'overview';

const SECTIONS = {
  overview: renderOverview,
  students: renderStudents,
  classcodes: renderClassCodes,
  parentcodes: renderParentCodes
};

// ── 초기화 ───────────────────────────────────────────────────
(async () => {
  const session = await BrickSyncAuth.requireRole(['teacher']);
  if (!session) return;
  teacherProfile = session.profile;
  teacherUid = session.user.uid;

  const n = teacherProfile.displayName || teacherProfile.email || '선생님';
  document.getElementById('sidebarName').textContent = n;
  document.getElementById('sidebarAvatar').textContent = n[0].toUpperCase();

  showSection('overview');
})();

function showToast(msg, type='info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.classList.remove('show'), 3000);
}

function showSection(section) {
  currentSection = section;
  document.querySelectorAll('.nav-item').forEach((el, i) => el.classList.remove('active'));
  const navMap = ['overview','students','classcodes','parentcodes'];
  const idx = navMap.indexOf(section);
  if (idx >= 0) document.querySelectorAll('.nav-item')[idx + 1]?.classList.add('active');
  SECTIONS[section]?.();
}

// ── 홈 개요 ──────────────────────────────────────────────────
async function renderOverview() {
  const main = document.getElementById('mainContent');
  main.innerHTML = `
    <div class="page-title">안녕하세요, ${teacherProfile?.displayName || '선생님'} 👋</div>
    <div class="page-subtitle">오늘도 BrickSync와 함께 즐거운 수업을 만들어보세요!</div>
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card"><div class="label">총 학생 수</div><div class="value" id="statStudents">-</div></div>
      <div class="stat-card"><div class="label">클래스 수</div><div class="value" id="statClasses">-</div></div>
      <div class="stat-card"><div class="label">발급된 학부모 코드</div><div class="value" id="statParentCodes">-</div></div>
    </div>
    <div class="panel-grid">
      <div class="panel">
        <div class="panel-title"><i class="fas fa-key"></i> 클래스 코드 발급</div>
        <div class="code-row">
          <input class="code-input" id="newClassName" placeholder="클래스명 (예: 2025년 3반)">
          <button class="btn-issue" onclick="issueClassCode()">발급</button>
        </div>
        <div class="code-result" id="classCodeResult">
          <span class="code-value" id="classCodeValue">-</span>
          <button class="btn-copy" onclick="copyText('classCodeValue','클래스 코드')">복사</button>
        </div>
      </div>
      <div class="panel">
        <div class="panel-title"><i class="fas fa-users"></i> 최근 접속 학생</div>
        <div id="recentStudents" class="loading"><i class="fas fa-spinner"></i> 로딩 중...</div>
      </div>
    </div>
  `;
  loadStats();
  loadRecentStudents();
}

async function loadStats() {
  if (!firestore) return;
  const [classSnap, parentSnap] = await Promise.all([
    firestore.collection('classes').where('teacherUid','==',teacherUid).get(),
    firestore.collection('parentCodes').where('teacherUid','==',teacherUid).get()
  ]);
  let totalStudents = 0;
  classSnap.forEach(d => { totalStudents += (d.data().studentUids || []).length; });
  document.getElementById('statStudents').textContent = totalStudents;
  document.getElementById('statClasses').textContent = classSnap.size;
  document.getElementById('statParentCodes').textContent = parentSnap.size;
}

async function loadRecentStudents() {
  if (!firestore) { document.getElementById('recentStudents').innerHTML = '<div class="empty-state"><i class="fas fa-wifi-slash"></i>오프라인 모드</div>'; return; }
  const snap = await firestore.collection('users')
    .where('teacherUid','==',teacherUid)
    .where('role','==','student')
    .limit(5).get();
  const el = document.getElementById('recentStudents');
  if (snap.empty) { el.innerHTML = '<div class="empty-state"><i class="fas fa-user-plus"></i>아직 등록된 학생이 없습니다</div>'; return; }
  el.innerHTML = '<div class="student-list">' + snap.docs.map(d => {
    const s = d.data();
    return `<div class="student-item">
      <div class="avatar-s">${(s.displayName||'?')[0]}</div>
      <div><div class="s-name">${s.displayName}</div><div class="s-class">${s.className||''}</div></div>
      <span class="s-status offline">오프라인</span>
    </div>`;
  }).join('') + '</div>';
}

// ── 클래스 코드 발급 ─────────────────────────────────────────
async function issueClassCode() {
  const name = document.getElementById('newClassName').value.trim();
  if (!name) { showToast('클래스명을 입력해주세요.', 'error'); return; }
  try {
    const code = await BrickSyncAuth.createClassCode(teacherUid, name);
    document.getElementById('classCodeValue').textContent = code;
    document.getElementById('classCodeResult').classList.add('show');
    document.getElementById('newClassName').value = '';
    showToast(`클래스 코드 발급 완료: ${code}`, 'success');
  } catch(e) { showToast('오류: ' + e.message, 'error'); }
}

// ── 학생 관리 ─────────────────────────────────────────────────
async function renderStudents() {
  document.getElementById('mainContent').innerHTML = `
    <div class="page-title">학생 관리</div>
    <div class="page-subtitle">내 클래스에 등록된 학생 목록입니다.</div>
    <div class="panel">
      <div class="panel-title"><i class="fas fa-users"></i> 전체 학생 목록</div>
      <div id="allStudents" class="loading"><i class="fas fa-spinner"></i> 로딩 중...</div>
    </div>`;

  if (!firestore) return;
  const snap = await firestore.collection('users').where('teacherUid','==',teacherUid).where('role','==','student').get();
  const el = document.getElementById('allStudents');
  if (snap.empty) { el.innerHTML = '<div class="empty-state"><i class="fas fa-user-plus"></i>등록된 학생이 없습니다.<br>클래스 코드를 발급하여 학생을 초대하세요.</div>'; return; }

  el.innerHTML = '<div class="student-list">' + snap.docs.map(d => {
    const s = d.data();
    return `<div class="student-item">
      <div class="avatar-s">${(s.displayName||'?')[0]}</div>
      <div><div class="s-name">${s.displayName}</div><div class="s-class">${s.className||''} · ${s.email}</div></div>
      <button class="btn-parent-code" onclick="issueParentCode('${d.id}','${s.displayName}')">
        <i class="fas fa-link"></i> 학부모 코드
      </button>
    </div>`;
  }).join('') + '</div>';
}

// ── 학부모 연결 코드 발급 모달 ───────────────────────────────
async function issueParentCode(studentUid, studentName) {
  if (!confirm(`${studentName} 학생의 학부모 연결 코드를 발급할까요?\n코드는 7일간 유효합니다.`)) return;
  try {
    const code = await BrickSyncAuth.createParentCode(teacherUid, studentUid, studentName);
    const msg = `✅ ${studentName} 학부모 연결 코드:\n\n${code}\n\n이 코드를 학부모님께 전달하세요. (7일 유효)`;
    alert(msg);
    showToast(`학부모 코드 발급: ${code}`, 'success');
  } catch(e) { showToast('오류: ' + e.message, 'error'); }
}

// ── 클래스 코드 목록 ─────────────────────────────────────────
async function renderClassCodes() {
  document.getElementById('mainContent').innerHTML = `
    <div class="page-title">클래스 코드 관리</div>
    <div class="page-subtitle">발급한 클래스 코드 목록입니다. 학생에게 코드를 공유하면 가입할 수 있습니다.</div>
    <div class="panel">
      <div class="panel-title"><i class="fas fa-key"></i> 새 클래스 코드 발급</div>
      <div class="code-row">
        <input class="code-input" id="newClassName2" placeholder="클래스명 입력">
        <button class="btn-issue" onclick="issueClassCode2()">발급</button>
      </div>
      <div class="code-result" id="classCodeResult2">
        <span class="code-value" id="classCodeValue2">-</span>
        <button class="btn-copy" onclick="copyText('classCodeValue2','클래스 코드')">📋 복사</button>
      </div>
    </div>
    <div class="panel" style="margin-top:20px">
      <div class="panel-title"><i class="fas fa-list"></i> 발급된 코드 목록</div>
      <div id="classCodeList" class="loading"><i class="fas fa-spinner"></i> 로딩 중...</div>
    </div>`;

  if (!firestore) return;
  const snap = await firestore.collection('classes').where('teacherUid','==',teacherUid).get();
  const el = document.getElementById('classCodeList');
  if (snap.empty) { el.innerHTML = '<div class="empty-state"><i class="fas fa-key"></i>발급된 클래스 코드가 없습니다.</div>'; return; }
  el.innerHTML = '<div class="class-list">' + snap.docs.map(d => {
    const c = d.data();
    return `<div class="class-item">
      <div>
        <div class="class-code-badge">${d.id}</div>
        <div class="class-info">${c.className}</div>
      </div>
      <div class="class-count">${(c.studentUids||[]).length}명 가입</div>
    </div>`;
  }).join('') + '</div>';
}

async function issueClassCode2() {
  const name = document.getElementById('newClassName2').value.trim();
  if (!name) { showToast('클래스명을 입력해주세요.', 'error'); return; }
  const code = await BrickSyncAuth.createClassCode(teacherUid, name);
  document.getElementById('classCodeValue2').textContent = code;
  document.getElementById('classCodeResult2').classList.add('show');
  document.getElementById('newClassName2').value = '';
  showToast('클래스 코드 발급 완료!', 'success');
  renderClassCodes();
}

// ── 학부모 코드 목록 ─────────────────────────────────────────
async function renderParentCodes() {
  document.getElementById('mainContent').innerHTML = `
    <div class="page-title">학부모 연결 코드</div>
    <div class="page-subtitle">발급한 학부모 연결 코드 목록입니다. (7일 유효)</div>
    <div class="panel">
      <div id="parentCodeList" class="loading"><i class="fas fa-spinner"></i> 로딩 중...</div>
    </div>`;

  if (!firestore) return;
  const snap = await firestore.collection('parentCodes').where('teacherUid','==',teacherUid).orderBy('createdAt','desc').limit(20).get();
  const el = document.getElementById('parentCodeList');
  if (snap.empty) { el.innerHTML = '<div class="empty-state"><i class="fas fa-link"></i>발급된 학부모 코드가 없습니다.<br>학생 관리 탭에서 학생별로 코드를 발급하세요.</div>'; return; }
  el.innerHTML = '<div class="class-list">' + snap.docs.map(d => {
    const p = d.data();
    const used = !!p.usedByUid;
    return `<div class="class-item">
      <div>
        <div class="class-code-badge">${d.id}</div>
        <div class="class-info">자녀: ${p.studentName}</div>
      </div>
      <div>
        <span class="s-status ${used ? 'offline' : 'online'}">${used ? '사용됨' : '미사용'}</span>
      </div>
    </div>`;
  }).join('') + '</div>';
}

// ── 유틸 ─────────────────────────────────────────────────────
function copyText(id, label) {
  const val = document.getElementById(id).textContent;
  navigator.clipboard.writeText(val).then(() => showToast(`${label} 복사 완료: ${val}`, 'success'));
}
</script>
</body>
</html>
