        // ------------------------------------------
        // [신규] 키보드 이벤트를 통한 선택 블록 및 하위 블록 파괴 (Delete, Backspace)
        // ------------------------------------------
        function deleteBlockAndChildren(targetBlock) {
            const siblingsToRemove = [targetBlock];
            let nextNode = targetBlock.nextElementSibling;
            while (nextNode) {
                if (!nextNode.classList.contains('placeholder')) siblingsToRemove.push(nextNode);
                nextNode = nextNode.nextElementSibling;
            }
            siblingsToRemove.forEach(n => {
                n.style.transition = 'transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.2s';
                n.style.transform = 'scale(0)';
                n.style.opacity = '0';
            });
            setTimeout(() => {
                const parentStack = targetBlock.closest('.block-stack');
                siblingsToRemove.forEach(n => n.remove());
                if (parentStack && parentStack.children.length === 0) parentStack.remove();
                haltExecution(); // 진행 중인 모터 백그라운드 엔진 중지 및 즉각 정지 명령 하달
            }, 200);
            if (targetBlock === selectedWorkspaceBlock) selectedWorkspaceBlock = null;
        }

        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

            if (e.key === 'Backspace' || e.key === 'Delete') {
                if (selectedStacks.length > 0) {
                    selectedStacks.forEach(stack => {
                        const firstBlock = stack.querySelector('.workspace-item');
                        if (firstBlock && firstBlock.getAttribute('data-action') !== 'start') {
                            deleteBlockAndChildren(firstBlock);
                        }
                    });
                    clearMultiSelection();
                } else if (selectedWorkspaceBlock) {
                    deleteBlockAndChildren(selectedWorkspaceBlock);
                }
            }
        });

        // ==========================================
        // 1. 최고급(Premium) 자석 스내핑 & 실시간 순서 정렬(Sortable) 드래그 앤 드롭 구현
        // ==========================================
        const palette = document.getElementById('palette');
        const workspaceArea = document.getElementById('workspaceArea');
        const trashArea = document.getElementById('trashArea');

        // ==========================================
        // 워크스페이스 무한 맵 및 줌인/줌아웃 로직 (마우스 스크롤)
        // ==========================================
        let currentZoom = 1;
        const zoomStep = 0.05;
        const minZoom = 0.3;
        const maxZoom = 2.0;

        // 마우스 휠 이벤트로 줌 처리 (커서 좌표를 기준으로 스케일링 보정)
        workspaceArea.parentElement.addEventListener('wheel', (e) => {
            // 하단 툴박스나 쓰레기통 등에 올렸을 때는 패스
            if (e.target.closest('.toolbox') || e.target.closest('.trash-area')) return;
            e.preventDefault();

            const rect = workspaceArea.parentElement.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            let wsLeft = parseFloat(workspaceArea.style.left) || 0;
            let wsTop = parseFloat(workspaceArea.style.top) || 0;

            const logicalX = (mouseX - wsLeft) / currentZoom;
            const logicalY = (mouseY - wsTop) / currentZoom;

            if (e.deltaY > 0) {
                currentZoom = Math.max(minZoom, currentZoom - zoomStep);
            } else {
                currentZoom = Math.min(maxZoom, currentZoom + zoomStep);
            }

            wsLeft = mouseX - (logicalX * currentZoom);
            wsTop = mouseY - (logicalY * currentZoom);

            workspaceArea.style.transform = `scale(${currentZoom})`;
            workspaceArea.style.left = `${wsLeft}px`;
            workspaceArea.style.top = `${wsTop}px`;
        }, { passive: false });

        // 작업공간을 광활하게 설정한 뒤 카메라 위치를 중앙(2500px 인근)으로 강제 이동
        // calc()를 사용하면 첫 parseFloat 시 NaN을 파싱하여 뷰어 이동 버그가 발생하므로 JS로 직접 px 단위 설정
        const initWsLeft = (window.innerWidth / 2) - 2500;
        const initWsTop = (workspaceArea.parentElement.clientHeight / 2) - 2500;
        workspaceArea.style.left = `${initWsLeft}px`;
        workspaceArea.style.top = `${initWsTop}px`;

        // ==========================================
        // 워크스페이스 배경 드래그(Pan) 및 다중 선택(Shift+Drag) 기능 구현
        // ==========================================
        let isPanning = false;
        let isSelecting = false;
        let startX = 0;
        let startY = 0;
        let startLeft = 0;
        let startTop = 0;
        let selectStartX = 0;
        let selectStartY = 0;
        let activePointerId = null; // 멀티터치 방지 고유 ID
        let selectedStacks = []; // 다중 선택된 스택 배열
        let dragStartLeft = 0;
        let dragStartTop = 0;
        let otherStacksStartCoords = []; // 보조 스택들의 원래 좌표 보관용
        let draggedStack = null;
        let draggedSiblings = [];

        workspaceArea.parentElement.addEventListener('pointerdown', (e) => {
            // 1. UI 영역 클릭 및 블록 드래그는 화면 이동/선택에서 제외
            if (e.target.closest('.toolbox') || e.target.closest('.trash-area') || e.target.closest('.top-bar')) return;
            if (e.target.closest('.block-stack')) return;

            // 2. 마우스 클릭 시 좌클릭만 허용
            if (e.pointerType === 'mouse' && e.button !== 0) return;

            // 3. Shift 키가 눌려있으면 다중 선택 드래그 박스 시작
            if (e.shiftKey) {
                isSelecting = true;
                activePointerId = e.pointerId;
                const rect = workspaceArea.parentElement.getBoundingClientRect();
                selectStartX = e.clientX - rect.left;
                selectStartY = e.clientY - rect.top;

                const box = document.getElementById('dragSelectionBox');
                if (box) {
                    box.style.left = `${selectStartX}px`;
                    box.style.top = `${selectStartY}px`;
                    box.style.width = '0px';
                    box.style.height = '0px';
                    box.style.display = 'block';
                }

                e.target.setPointerCapture(e.pointerId);
                e.preventDefault();
                return;
            }

            // 4. 일반 드래그 시 화면 이동(Pan) 시작
            clearMultiSelection();

            isPanning = true;
            activePointerId = e.pointerId;
            startX = e.clientX;
            startY = e.clientY;
            startLeft = parseFloat(workspaceArea.style.left) || 0;
            startTop = parseFloat(workspaceArea.style.top) || 0;

            e.target.setPointerCapture(e.pointerId);

            workspaceArea.style.cursor = 'grabbing';
            workspaceArea.parentElement.style.cursor = 'grabbing';
            e.preventDefault();
        });

        window.addEventListener('pointermove', (e) => {
            if (isSelecting && e.pointerId === activePointerId) {
                const rect = workspaceArea.parentElement.getBoundingClientRect();
                const currentX = e.clientX - rect.left;
                const currentY = e.clientY - rect.top;

                const left = Math.min(selectStartX, currentX);
                const top = Math.min(selectStartY, currentY);
                const width = Math.abs(selectStartX - currentX);
                const height = Math.abs(selectStartY - currentY);

                const box = document.getElementById('dragSelectionBox');
                if (box) {
                    box.style.left = `${left}px`;
                    box.style.top = `${top}px`;
                    box.style.width = `${width}px`;
                    box.style.height = `${height}px`;
                }
                return;
            }

            if (isPanning && e.pointerId === activePointerId) {
                const dx = e.clientX - startX;
                const dy = e.clientY - startY;

                workspaceArea.style.left = `${startLeft + dx}px`;
                workspaceArea.style.top = `${startTop + dy}px`;
            }
        });

        const endPointerAction = (e) => {
            if (isSelecting && e.pointerId === activePointerId) {
                isSelecting = false;
                activePointerId = null;
                const box = document.getElementById('dragSelectionBox');
                if (box) {
                    const rect = box.getBoundingClientRect();
                    box.style.display = 'none';
                    evaluateSelection(rect);
                }
                return;
            }

            if (isPanning && e.pointerId === activePointerId) {
                isPanning = false;
                activePointerId = null;
                workspaceArea.style.cursor = '';
                workspaceArea.parentElement.style.cursor = '';
            }
        };

        window.addEventListener('pointerup', endPointerAction);
        window.addEventListener('pointercancel', endPointerAction);

        // 충돌 검사 및 다중 선택 그룹 하이라이트 활성화
        function evaluateSelection(boxRect) {
            clearMultiSelection();
            if (boxRect.width < 5 || boxRect.height < 5) return;

            const stacks = workspaceArea.querySelectorAll('.block-stack');
            stacks.forEach(stack => {
                const stackRect = stack.getBoundingClientRect();
                const isOverlapping = !(
                    stackRect.right < boxRect.left ||
                    stackRect.left > boxRect.right ||
                    stackRect.bottom < boxRect.top ||
                    stackRect.top > boxRect.bottom
                );

                if (isOverlapping) {
                    stack.classList.add('selected-stack');
                    selectedStacks.push(stack);
                }
            });
        }

        // 다중 선택 상태 클리어
        function clearMultiSelection() {
            selectedStacks.forEach(stack => {
                stack.classList.remove('selected-stack');
            });
            selectedStacks = [];
        }

        let dragSourceNode = null;
        let placeholder = null;

        document.addEventListener('dragstart', (e) => {
            if (e.target.classList.contains('spike-block')) {
                dragSourceNode = e.target;

                // 다중 선택된 그룹 드래그 상태 보존
                const sourceStack = dragSourceNode.closest('.block-stack');
                if (sourceStack && selectedStacks.includes(sourceStack)) {
                    draggedStack = sourceStack;
                    dragStartLeft = parseFloat(sourceStack.style.left) || 0;
                    dragStartTop = parseFloat(sourceStack.style.top) || 0;
                    otherStacksStartCoords = selectedStacks.map(stack => ({
                        stack: stack,
                        left: parseFloat(stack.style.left) || 0,
                        top: parseFloat(stack.style.top) || 0
                    }));
                } else {
                    draggedStack = null;
                    otherStacksStartCoords = [];
                }

                // Capture subsequent siblings in the same stack (group dragging)
                draggedSiblings = [];
                if (sourceStack) {
                    let next = dragSourceNode.nextElementSibling;
                    while (next) {
                        if (!next.classList.contains('placeholder')) {
                            draggedSiblings.push(next);
                        }
                        next = next.nextElementSibling;
                    }
                }

                e.dataTransfer.effectAllowed = 'copyMove';

                // Create custom drag image containing dragSourceNode and its siblings
                if (sourceStack) {
                    const dragImgContainer = document.createElement('div');
                    dragImgContainer.className = 'block-stack';
                    dragImgContainer.style.cssText = 'position: absolute; top: -9999px; left: -9999px; display: inline-flex; align-items: center; white-space: nowrap; pointer-events: none;';

                    // Clone dragSourceNode and its siblings
                    const cloneNode = dragSourceNode.cloneNode(true);
                    cloneNode.style.display = 'inline-flex';
                    cloneNode.style.opacity = '1';
                    dragImgContainer.appendChild(cloneNode);

                    draggedSiblings.forEach(sib => {
                        const cloneSib = sib.cloneNode(true);
                        cloneSib.style.display = 'inline-flex';
                        cloneSib.style.opacity = '1';
                        dragImgContainer.appendChild(cloneSib);
                    });

                    document.body.appendChild(dragImgContainer);

                    const blockRect = dragSourceNode.getBoundingClientRect();
                    const offsetX = e.clientX - blockRect.left;
                    const offsetY = e.clientY - blockRect.top;

                    e.dataTransfer.setDragImage(dragImgContainer, offsetX, offsetY);

                    // Remove the offscreen container after a short delay
                    setTimeout(() => {
                        dragImgContainer.remove();
                    }, 0);
                }

                // 빈 공간을 벌려줄 예쁜 투명 플레이스홀더 생성
                placeholder = document.createElement('div');
                placeholder.className = 'workspace-item placeholder';
                placeholder.style.cssText = 'width: 70px; height: 70px; background: rgba(0,0,0,0.08); border-radius: 16px; margin-right: -8px; border: 2px dashed rgba(0,0,0,0.2); transform: scale(0.9); transition: transform 0.1s; pointer-events: none;';

                if (dragSourceNode.closest('.block-stack')) {
                    // 워크스페이스 내부 이동일 경우: 원본은 남겨두되 투명하게 숨김 (브라우저 D&D 취소 버그 방지)
                    setTimeout(() => {
                        dragSourceNode.style.display = 'none';
                        draggedSiblings.forEach(sib => sib.style.display = 'none');
                        dragSourceNode.parentElement.insertBefore(placeholder, dragSourceNode);
                    }, 0);
                } else {
                    // 툴박스에서 꺼낼 경우
                    setTimeout(() => dragSourceNode.classList.add('dragging'), 0);
                }
            }
        });

        document.addEventListener('dragend', (e) => {
            if (!dragSourceNode) return;
            dragSourceNode.classList.remove('dragging');
            if (dragSourceNode.style.display === 'none') {
                dragSourceNode.style.display = 'inline-flex'; // 다시 보이게
            }
            draggedSiblings.forEach(sib => {
                if (sib.style.display === 'none') {
                    sib.style.display = 'inline-flex';
                }
            });
            if (trashArea) trashArea.classList.remove('drag-over');

            if (placeholder && placeholder.parentElement) {
                // 드롭이 제대로 안끝나면 제자리로 돌리기 처리
                if (placeholder.parentElement.classList.contains('block-stack')) {
                    const parent = placeholder.parentElement;
                    parent.insertBefore(dragSourceNode, placeholder);
                    draggedSiblings.forEach(sib => {
                        parent.insertBefore(sib, placeholder);
                    });
                }
                placeholder.remove();
            }

            // 다중 선택 그룹 동시 이동 델타값 정렬 수행
            const sourceStack = dragSourceNode.closest('.block-stack');
            if (otherStacksStartCoords.length > 0) {
                setTimeout(() => {
                    const finalLeft = parseFloat(sourceStack.style.left) || 0;
                    const finalTop = parseFloat(sourceStack.style.top) || 0;
                    const dx = finalLeft - dragStartLeft;
                    const dy = finalTop - dragStartTop;

                    if (Math.abs(dx) > 1 || Math.abs(dy) > 1) {
                        otherStacksStartCoords.forEach(coord => {
                            if (coord.stack !== draggedStack) {
                                coord.stack.style.left = `${coord.left + dx}px`;
                                coord.stack.style.top = `${coord.top + dy}px`;
                            }
                        });
                    }

                    // Update selectedStacks with the new sourceStack (since the dragged block might be inside a new stack now)
                    if (sourceStack && !selectedStacks.includes(sourceStack)) {
                        selectedStacks.push(sourceStack);
                        sourceStack.classList.add('selected-stack');
                    }

                    // Filter out empty or detached stacks
                    selectedStacks = selectedStacks.filter(stack => {
                        const exists = document.body.contains(stack) && stack.children.length > 0;
                        if (!exists) {
                            stack.classList.remove('selected-stack');
                        }
                        return exists;
                    });

                    otherStacksStartCoords = [];
                    draggedStack = null;
                }, 50);
            } else {
                otherStacksStartCoords = [];
                draggedStack = null;
            }

            dragSourceNode = null;
            draggedSiblings = [];
            placeholder = null;

            // 내용 없는 빈 스택 정리
            document.querySelectorAll('.block-stack').forEach(s => {
                if (s.children.length === 0 && !s.classList.contains('loop-inner-stack')) s.remove();
            });

            // 실시간 z-index 퍼즐 정렬 업데이트
            setTimeout(() => {
                Array.from(workspaceArea.querySelectorAll('.block-stack')).forEach(stack => {
                    const items = Array.from(stack.querySelectorAll('.workspace-item:not(.placeholder)'));
                    items.forEach((item, index) => {
                        item.style.zIndex = 100 - index;
                    });
                });
            }, 10);
        });

        // "배경"에 드롭 시 자동 삭제 구현
        // 문서 전체에 대해서 이벤트를 수신하여, 지정된 구역 밖이면 지워버림
        document.addEventListener('dragover', (e) => {
            e.preventDefault();
        });
        document.addEventListener('drop', (e) => {
            if (dragSourceNode && dragSourceNode.classList.contains('workspace-item')) {
                if (!e.target.closest('#workspaceArea') && !e.target.closest('#palette') && !e.target.closest('#trashArea')) {
                    if (dragSourceNode.getAttribute('data-action') !== 'start') {
                        if (selectedStacks.length > 0) {
                            selectedStacks.forEach(stack => {
                                const firstBlock = stack.querySelector('.workspace-item');
                                if (firstBlock && firstBlock.getAttribute('data-action') !== 'start') {
                                    deleteBlockAndChildren(firstBlock);
                                }
                            });
                            clearMultiSelection();
                        } else {
                            deleteBlockAndChildren(dragSourceNode);
                        }
                        if (placeholder) placeholder.remove();
                    }
                }
            }
        });

        // 실시간 순서 정렬용 좌표 계산 함수
        function getDragAfterElement(container, x) {
            // 플레이스홀더 및 드래그중 숨김처리된 엘리먼트 제외
            const draggableElements = [...container.querySelectorAll('.workspace-item:not(.placeholder):not(.dragging)')].filter(el => el.style.display !== 'none');
            return draggableElements.reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                const offset = x - box.left - box.width / 2; // 블럭 중심(width/2) 기준으로 앞뒤 판별
                if (offset < 0 && offset > closest.offset) {
                    return { offset: offset, element: child };
                } else {
                    return closest;
                }
            }, { offset: Number.NEGATIVE_INFINITY }).element;
        }

        // 모눈종이 위에서 드래그 중일 때 실시간으로 위치 이동 (끼워넣기)
        workspaceArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'copyMove';

            if (dragSourceNode && placeholder) {
                // 팝업 숨기기 위함
                const hint = workspaceArea.querySelector('.hint-text');
                if (hint) hint.style.display = 'none';

                let targetStack = null;
                let minDist = Infinity;
                const stacks = workspaceArea.querySelectorAll('.block-stack');
                stacks.forEach(stack => {
                    const rect = stack.getBoundingClientRect();
                    // 블록들이 살짝 겹치기만 해도 자석처럼 스냅되도록 범위를 넓힘 (수평 120px, 수직 80px 반경)
                    if (e.clientY >= rect.top - 80 && e.clientY <= rect.bottom + 80 &&
                        e.clientX >= rect.left - 120 && e.clientX <= rect.right + 120) {
                        // 자석 범위가 겹칠 경우 가장 마우스 위치와 가까운 스택 그룹을 우선 선택
                        const centerX = rect.left + rect.width / 2;
                        const centerY = rect.top + rect.height / 2;
                        const dist = Math.hypot(e.clientX - centerX, e.clientY - centerY);
                        if (dist < minDist) {
                            minDist = dist;
                            targetStack = stack;
                        }
                    }
                });

                if (targetStack) {
                    placeholder.style.position = 'relative';
                    placeholder.style.left = 'auto';
                    placeholder.style.top = 'auto';
                    placeholder.style.marginRight = '-8px'; // 기존 자석 겹침 스타일

                    if (placeholder.parentElement !== targetStack) {
                        targetStack.appendChild(placeholder);
                    }

                    const afterElement = getDragAfterElement(targetStack, e.clientX);
                    if (afterElement == null) {
                        targetStack.appendChild(placeholder);
                    } else if (afterElement.getAttribute('data-action') === 'start') {
                        // 시작 블럭보다 앞(왼쪽)에 배치하는 것은 구조적으로 금지! 시작 블럭 다음으로 삽입
                        targetStack.insertBefore(placeholder, afterElement.nextSibling);
                    } else {
                        targetStack.insertBefore(placeholder, afterElement);
                    }
                } else {
                    // 주변에 스택이 없을 때 완전 자유 2D 배치
                    if (placeholder.parentElement !== workspaceArea) {
                        workspaceArea.appendChild(placeholder);
                    }
                    placeholder.style.position = 'absolute';
                    placeholder.style.marginRight = '0';
                    const wsRect = workspaceArea.getBoundingClientRect();
                    // 배율(currentZoom)을 나누어 절대 줌 상태에서도 정확히 마우스 끝에 블록이 위치하게 보정
                    placeholder.style.left = ((e.clientX - wsRect.left) / currentZoom - 35) + 'px';
                    placeholder.style.top = ((e.clientY - wsRect.top) / currentZoom - 35) + 'px';
                }
            }
        });

        workspaceArea.addEventListener('drop', (e) => {
            e.preventDefault();
            if (dragSourceNode && placeholder && placeholder.parentElement) {
                let finalBlock;
                if (dragSourceNode.parentElement === palette) {
                    finalBlock = dragSourceNode.cloneNode(true);
                    finalBlock.classList.add('workspace-item');
                    finalBlock.classList.remove('dragging');
                } else {
                    finalBlock = dragSourceNode;
                }

                const targetParent = placeholder.parentElement;
                if (targetParent === workspaceArea) {
                    // 근처에 스택이 없어서 모눈종이 직속(자유배치)된 경우 새 스택 컨테이너화
                    const newStack = document.createElement('div');
                    newStack.className = 'block-stack';
                    newStack.style.left = placeholder.style.left;
                    newStack.style.top = placeholder.style.top;
                    workspaceArea.appendChild(newStack);
                    newStack.appendChild(finalBlock);
                    draggedSiblings.forEach(sib => {
                        newStack.appendChild(sib);
                    });
                } else {
                    targetParent.insertBefore(finalBlock, placeholder);
                    draggedSiblings.forEach(sib => {
                        targetParent.insertBefore(sib, placeholder);
                    });
                }

                finalBlock.style.display = 'inline-flex'; // 혹시 숨겨져 있었다면 복구
                draggedSiblings.forEach(sib => sib.style.display = 'inline-flex');

                // 삽입완료 후 플레이스홀더 즉시 삭제
                placeholder.remove();

                if (dragSourceNode.parentElement === palette) {
                    finalBlock.style.transform = 'scale(0.8)';
                    setTimeout(() => finalBlock.style.transform = 'scale(1)', 50);
                }
            }
        });

        if (trashArea) {
            trashArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                trashArea.classList.add('drag-over');
            });
            trashArea.addEventListener('dragleave', (e) => {
                trashArea.classList.remove('drag-over');
            });
            trashArea.addEventListener('drop', (e) => {
                e.preventDefault();
                trashArea.classList.remove('drag-over');
                if (dragSourceNode) {
                    if (selectedStacks.length > 0) {
                        selectedStacks.forEach(stack => {
                            const firstBlock = stack.querySelector('.workspace-item');
                            if (firstBlock && firstBlock.getAttribute('data-action') !== 'start') {
                                deleteBlockAndChildren(firstBlock);
                            }
                        });
                        clearMultiSelection();
                        if (placeholder) placeholder.remove();
                    } else if (dragSourceNode.classList.contains('workspace-item') || dragSourceNode.parentElement === workspaceArea) {
                        if (dragSourceNode.getAttribute('data-action') !== 'start') {
                            deleteBlockAndChildren(dragSourceNode);
                            if (placeholder) placeholder.remove(); // 허공에 남은 틀 제거
                        } else {
                            alert("시작 블럭은 지울 수 없습니다!");
                            if (placeholder) workspaceArea.insertBefore(dragSourceNode, placeholder);
                            dragSourceNode.style.display = 'inline-flex';
                        }
                    }
                }
            });
        }

        // ==========================================
        // 브라우저에서 소리 재생 (아이들이 좋아할 귀여운 마림바/실로폰 톤)
        // ==========================================
        function playBrowserBeep(soundIndex) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const now = ctx.currentTime;

                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);

                // 기본 볼륨 설정 0 (서서히 커지도록 설정)
                gain.gain.setValueAtTime(0, now);

                // 5초 분량의 8가지 테마 멜로디 시퀀서 
                function playMelody(notes, speedMultipier = 1) {
                    let timeOffset = now;
                    notes.forEach(note => {
                        const freq = note[0];
                        const duration = note[1] * speedMultipier; // 박자 조절
                        if (freq > 0) {
                            const noteOsc = ctx.createOscillator();
                            const noteGain = ctx.createGain();
                            noteOsc.connect(noteGain);
                            noteGain.connect(ctx.destination);

                            noteOsc.type = note[2] || 'square';
                            noteOsc.frequency.setValueAtTime(freq, timeOffset);

                            const savedVol = localStorage.getItem('bricksync_volume');
                            const userVol = savedVol !== null ? parseFloat(savedVol) : 1.0;
                            const peakGain = 0.3 * userVol;

                            noteGain.gain.setValueAtTime(0, timeOffset);
                            noteGain.gain.linearRampToValueAtTime(peakGain, timeOffset + 0.05);
                            noteGain.gain.exponentialRampToValueAtTime((0.01 * userVol) || 0.001, timeOffset + duration - 0.01);

                            noteOsc.start(timeOffset);
                            noteOsc.stop(timeOffset + duration);
                        }
                        timeOffset += duration;
                    });
                }

                switch (parseInt(soundIndex)) {
                    case 1: // 신나는 모험 출발 (미,솔,도,레,미~~~ / 경쾌한 아침) - 약 4.5초
                        playMelody([
                            [330, 0.4, 'triangle'], [392, 0.4, 'triangle'], [261, 0.8, 'triangle'], [293, 0.4, 'triangle'], [330, 1.2, 'triangle'], [0, 0.2],
                            [392, 0.4, 'triangle'], [330, 0.4, 'triangle'], [261, 0.8, 'triangle'], [293, 0.6, 'triangle'], [261, 2.0, 'triangle']
                        ], 0.7);
                        break;
                    case 2: // 우주 정거장 탐험 (신비로운 우주 느낌) - 약 5초
                        playMelody([
                            [440, 0.6, 'sine'], [554, 0.6, 'sine'], [659, 1.2, 'sine'], [440, 0.6, 'sine'], [330, 1.0, 'sine'], [0, 0.2],
                            [554, 0.6, 'sine'], [659, 0.6, 'sine'], [880, 1.5, 'sine'], [659, 2.0, 'sine']
                        ], 0.8);
                        break;
                    case 3: // 슈퍼 마리오 스타일의 8비트 경쾌 달리기 - 약 4.5초
                        playMelody([
                            [659, 0.15, 'square'], [659, 0.15, 'square'], [0, 0.15], [659, 0.15, 'square'], [0, 0.15], [523, 0.15, 'square'], [659, 0.15, 'square'], [0, 0.15],
                            [784, 0.3, 'square'], [0, 0.3], [392, 0.3, 'square'], [0, 0.3],
                            [523, 0.3, 'square'], [392, 0.3, 'square'], [330, 0.3, 'square'], [440, 0.3, 'square'], [494, 0.3, 'square'], [466, 0.15, 'square'], [440, 0.6, 'square']
                        ], 1.0);
                        break;
                    case 4: // 보스전 등장 (묵직하고 긴장감 넘치는 베이스) - 약 5초
                        playMelody([
                            [130, 0.4, 'sawtooth'], [146, 0.4, 'sawtooth'], [155, 1.5, 'sawtooth'], [0, 0.2],
                            [130, 0.4, 'sawtooth'], [146, 0.4, 'sawtooth'], [155, 1.2, 'sawtooth'], [146, 0.4, 'sawtooth'], [130, 2.0, 'sawtooth']
                        ], 1.2);
                        break;
                    case 5: // 숲속의 요정 (아름다운 아르페지오 잔향) - 약 6초
                        playMelody([
                            [523, 0.2, 'sine'], [659, 0.2, 'sine'], [784, 0.2, 'sine'], [1046, 0.8, 'sine'], [0, 0.2],
                            [440, 0.2, 'sine'], [523, 0.2, 'sine'], [659, 0.2, 'sine'], [880, 0.8, 'sine'], [0, 0.2],
                            [392, 0.2, 'sine'], [494, 0.2, 'sine'], [587, 0.2, 'sine'], [784, 0.8, 'sine'], [0, 0.2],
                            [523, 1.0, 'sine'], [659, 1.0, 'sine'], [1046, 3.0, 'sine']
                        ], 0.6);
                        break;
                    case 6: // 장난꾸러기 유령 (미끄러지듯 스멀스멀 거리는 리듬) - 약 5초 
                        playMelody([
                            [300, 0.5, 'triangle'], [320, 0.5, 'triangle'], [280, 1.0, 'triangle'], [0, 0.2],
                            [350, 0.3, 'triangle'], [370, 0.3, 'triangle'], [330, 1.2, 'triangle'], [0, 0.2],
                            [400, 0.3, 'triangle'], [450, 0.3, 'triangle'], [380, 2.5, 'triangle']
                        ], 1.0);
                        break;
                    case 7: // 대상 수상! 팡파레! (승리와 축하) - 약 4.5초
                        playMelody([
                            [392, 0.2, 'square'], [392, 0.2, 'square'], [392, 0.2, 'square'], [523, 1.0, 'square'], [0, 0.1],
                            [392, 0.2, 'square'], [392, 0.2, 'square'], [392, 0.2, 'square'], [587, 1.0, 'square'], [0, 0.1],
                            [523, 0.2, 'square'], [587, 0.2, 'square'], [659, 0.2, 'square'], [784, 2.5, 'square']
                        ], 1.0);
                        break;
                    case 8: // 레트로 자동차 경주 질주음 - 약 5초 
                        playMelody([
                            [220, 0.4, 'sawtooth'], [220, 0.4, 'sawtooth'], [220, 0.8, 'sawtooth'], [0, 0.2],
                            [261, 0.4, 'sawtooth'], [261, 0.4, 'sawtooth'], [261, 0.8, 'sawtooth'], [0, 0.2],
                            [293, 0.4, 'sawtooth'], [293, 0.4, 'sawtooth'], [293, 0.8, 'sawtooth'], [0, 0.2],
                            [329, 0.2, 'sawtooth'], [349, 0.2, 'sawtooth'], [392, 0.2, 'sawtooth'], [440, 2.5, 'sawtooth']
                        ], 0.8);
                        break;
                    default:
                        playMelody([[440, 1.0, 'sine'], [880, 2.0, 'sine'], [440, 1.5, 'sine']]);
                }
            } catch (e) { console.log("Audio not supported / Interaction needed first"); }
        }

        // ==========================================
        // 2. Web Serial API & 파이썬 코어 컴파일러 (Generator)
        // ==========================================
        // 연결 팝업 (Modal) UI 및 로직
        // ==========================================
        function openConnectModal() {
            document.getElementById('connectModal').style.display = 'flex';

                                bleQueue.push({ action: 'car_stop', speed: 0, dir: action, delay: currentBleDelay });
                                currentBleDelay += 500;
                                break;
                            case 'motor_cw':
                                for (let i = 0; i < timeVal; i++) {
                                    bleQueue.push({ action: 'motor_cw', speed: bleGlobalMotorSpeed, delay: currentBleDelay });
                                    currentBleDelay += 1000;
                                }
                                currentBleDelay += 800;
                                break;
                            case 'motor_ccw':
                                for (let i = 0; i < timeVal; i++) {
                                    bleQueue.push({ action: 'motor_ccw', speed: -bleGlobalMotorSpeed, delay: currentBleDelay });
                                    currentBleDelay += 1000;
                                }
                                currentBleDelay += 800;
                                break;
                            case 'motor_stop':
                                bleQueue.push({ action: 'motor_stop_generic', speed: 0, delay: currentBleDelay });
                                currentBleDelay += 800;
                                break;
                            case 'sound_note':
                            case 'sound_animal':
                            case 'sound_play':
                                currentBleDelay += 5000;
                                break;
                            case 'event_color_sensor':
                                bleQueue.push({ action: 'wait_color', targetColor: paramVal, delay: currentBleDelay });
                                break;
                            case 'event_distance_sensor':
                                bleQueue.push({ action: 'wait_distance', targetDistance: paramVal, delay: currentBleDelay });
                                break;
                            case 'flow_wait':
                                currentBleDelay += (paramVal * 1000);
                                break;
                            case 'control_repeat':
                            case 'control_forever':
                                break;
                            case 'matrix_image':
                            case 'matrix_pixel':
                                let freshMatEl = block.querySelector('.param-unified') || block.querySelector('.block-param:not(.param-time)');
                                let matrixArrBLE = freshMatEl ? (freshMatEl.getAttribute('data-matrix') || JSON.stringify([0, 6, 0, 0, 0, 0, 6, 0, 6])) : JSON.stringify([0, 6, 0, 0, 0, 0, 6, 0, 6]);
                                let mBleTime = freshMatEl ? (parseFloat(freshMatEl.getAttribute('data-val')) || 2) : 2;

                                bleQueue.push({ action: 'matrix', colors: JSON.parse(matrixArrBLE), delay: currentBleDelay });
                                currentBleDelay += (mBleTime * 1000);
                                bleQueue.push({ action: 'matrix_clear', delay: currentBleDelay });
                                currentBleDelay += 300;
                                break;
                            case 'matrix_clear':
                                bleQueue.push({ action: 'matrix_clear', delay: currentBleDelay });
                                currentBleDelay += 300;
                                break;
                            case 'action_send_message':
                                bleQueue.push({ action: 'send_message', delay: currentBleDelay });
                                currentBleDelay += 200;
                                break;
                        }
                    });

                    if (currentBleDelay > maxGlobalDelay) {
                        maxGlobalDelay = currentBleDelay;
                    }

                    const executeBleQueue = async () => {
                        let lastExecutionTime = 0;
                        for (const cmd of bleQueue) {
                            if (window.bleEngineRunCounter !== currentRunId) return; // ?�전 ?�행 루프 취소
                            try {
                                const waitTime = cmd.delay - lastExecutionTime;

                                if (waitTime > 0 && cmd.action !== 'wait_color' && cmd.action !== 'wait_distance') {
                                    console.log(`?�️ [BLE_ENGINE] Executing cmd: ${cmd.action} (waitTime: ${waitTime}ms)`);
                                    await new Promise(r => setTimeout(r, waitTime));
                                    lastExecutionTime = cmd.delay;
                                }

                                if (window.bleEngineRunCounter !== currentRunId) return;

                                if (cmd.action === 'motor' || cmd.action === 'motor_cw' || cmd.action === 'motor_ccw' || cmd.action.startsWith('motor_stop')) {
                                    if (cmd.action === 'motor_cw') try { window.parent.sendWebSocketAction({ action: 'MWHEEL_RIGHT' }); } catch (e) { }
                                    else if (cmd.action === 'motor_ccw') try { window.parent.sendWebSocketAction({ action: 'MWHEEL_LEFT' }); } catch (e) { }
                                    else if (cmd.action === 'motor_stop_cw') try { window.parent.sendWebSocketAction({ action: 'STOP_MWHEEL_RIGHT' }); } catch (e) { }
                                    else if (cmd.action === 'motor_stop_ccw') try { window.parent.sendWebSocketAction({ action: 'STOP_MWHEEL_LEFT' }); } catch (e) { }
                                    else if (cmd.action === 'motor_stop_generic') try {
                                        window.parent.sendWebSocketAction({ action: 'STOP_MWHEEL_LEFT' });
                                        window.parent.sendWebSocketAction({ action: 'STOP_MWHEEL_RIGHT' });
                                    } catch (e) { }
                                    let speedInt = Math.round(cmd.speed);
                                    let speedHex = speedInt < 0 ? (256 + speedInt) : speedInt;
                                    for (let p = 0; p < 2; p++) {
                                        const dev = window.parent.hubDevices ? window.parent.hubDevices[p] : undefined;
                                        if (dev === 64 || dev === 61 || dev === 62 || dev === 63) continue;
                                        await window.parent.writeToHub(new Uint8Array([8, 0, 0x81, p, 0x10, 0x51, 0x00, speedHex])).catch(e => { });
                                        await new Promise(r => setTimeout(r, 60));
                                        break; // 전문가 패치: 파란색(단일 모터) 블록은 가장 먼저 인식된 모터 1개만 돌리고 루프 탈출
                                    }
                                } else if (cmd.action === 'motor_speed_set') {
                                    try { window.parent.sendWebSocketAction({ action: 'SPEED_' + cmd.speedLevel }); } catch (e) { }
                                } else if (cmd.action.startsWith('car_') && cmd.action !== 'car_speed_set' && cmd.action !== 'car_stop') {
                                    let fws = cmd.action === 'car_forward' ? 'UP' : cmd.action === 'car_backward' ? 'DOWN' : cmd.action === 'car_left' ? 'LEFT' : 'RIGHT';
                                    try { window.parent.sendWebSocketAction({ action: 'STEER_' + fws }); } catch (e) { }

                                    for (let p = 0; p < 2; p++) {
                                        const dev = window.parent.hubDevices ? window.parent.hubDevices[p] : undefined;
                                        if (dev === 64 || dev === 61 || dev === 62 || dev === 63) continue;

                                        let p0_s = (cmd.action === 'car_forward' || cmd.action === 'car_right') ? -1 : 1;
                                        let p1_s = (cmd.action === 'car_forward' || cmd.action === 'car_left') ? 1 : -1;

                                        let spd = p === 0 ? (cmd.speed * p0_s) : (cmd.speed * p1_s);
                                        let speedInt = Math.round(spd);
                                        let speedHex = speedInt < 0 ? (256 + speedInt) : speedInt;
                                        await window.parent.writeToHub(new Uint8Array([8, 0, 0x81, p, 0x10, 0x51, 0x00, speedHex])).catch(e => { });
                                        await new Promise(r => setTimeout(r, 60));
                                    }
                                } else if (cmd.action === 'car_stop') {
                                    let fws = cmd.dir === 'car_forward' ? 'UP' : cmd.dir === 'car_backward' ? 'DOWN' : cmd.dir === 'car_left' ? 'LEFT' : 'RIGHT';
                                    try { window.parent.sendWebSocketAction({ action: 'STOP_' + fws }); } catch (e) { }

                                    for (let p = 0; p < 2; p++) {
                                        const dev = window.parent.hubDevices ? window.parent.hubDevices[p] : undefined;
                                        if (dev === 64 || dev === 61 || dev === 62 || dev === 63) continue;

                                        await window.parent.writeToHub(new Uint8Array([8, 0, 0x81, p, 0x10, 0x51, 0x00, 0])).catch(e => { });
                                        await new Promise(r => setTimeout(r, 60));
                                    }
                                } else if (cmd.action === 'matrix') {
                                    try { window.parent.sendWebSocketAction({ action: 'ACTION_LIGHT' }); } catch (e) { }
                                    let encodedColors = cmd.colors.map(c => c > 0 ? c + 160 : 0);
                                    let targetPort = 0;
                                    for (let p = 0; p < 6; p++) {
                                        if (window.parent.hubDevices && window.parent.hubDevices[p] === 64) {
                                            targetPort = p; break;
                                        }
                                    }
                                    let payload = [16, 0, 0x81, targetPort, 0x10, 0x51, 0x02, ...encodedColors];
                                    await window.parent.writeToHub(new Uint8Array(payload)).catch(e => { });
                                    await new Promise(r => setTimeout(r, 40));
                                } else if (cmd.action === 'matrix_clear') {
                                    let targetPort = 0;
                                    for (let p = 0; p < 6; p++) {
                                        if (window.parent.hubDevices && window.parent.hubDevices[p] === 64) {
                                            targetPort = p; break;
                                        }
                                    }
                                    let payload = [16, 0, 0x81, targetPort, 0x10, 0x51, 0x02, 0, 0, 0, 0, 0, 0, 0, 0, 0];
                                    await window.parent.writeToHub(new Uint8Array(payload)).catch(e => { });
                                    await new Promise(r => setTimeout(r, 40));
                                } else if (cmd.action === 'wait_color') {
                                    console.log(`?�️ [BLE_ENGINE] Waiting for Color Sensor to detect color ID: ${cmd.targetColor}`);
                                    let matched = false;
                                    while (!matched && window.bleEngineRunCounter === currentRunId) {
                                        if (window.parent.sensorData) {
                                            for (let p = 0; p < 6; p++) {
                                                if (window.parent.hubDevices && window.parent.hubDevices[p] === 61) {
                                                    if (window.parent.sensorData[p] === cmd.targetColor) {
                                                        matched = true;
                                                        break;
                                                    }
                                                }
                                            }
                                        }
                                        if (!matched) await new Promise(r => setTimeout(r, 100)); // ?�링 주기 100ms
                                    }
                                    if (!matched) return; // ?��? 취소
                                    console.log(`??[BLE_ENGINE] Target Color ${cmd.targetColor} Detected! Continuing sequence...`);

                                    // ?�?�라???�기??- ?�벤??조건 만족 ?��????�레?��? ?�용?�게 ??
                                    lastExecutionTime = cmd.delay;
                                } else if (cmd.action === 'wait_distance') {
                                    console.log("📡 [BLE_ENGINE] Waiting for Distance Sensor to detect obstacles");
                                    let matched = false;
                                    while (!matched && window.bleEngineRunCounter === currentRunId) {
                                        if (window.parent.sensorData) {
                                            for (let p = 0; p < 6; p++) {
                                                if (window.parent.hubDevices && window.parent.hubDevices[p] === 62) {
                                                    let distVal = window.parent.sensorData[p];
                                                    if (distVal !== undefined && distVal < 10) {
                                                        matched = true;
                                                        break;
                                                    }
                                                }
                                            }
                                        }
                                        if (!matched) await new Promise(r => setTimeout(r, 100));
                                    }
                                    if (!matched) return;
                                    console.log("🚨 [BLE_ENGINE] Obstacle Detected! Continuing sequence...");
                                    lastExecutionTime = cmd.delay;
                                }
                            } catch (e) {
                                console.error("??[BLE_ENGINE] Command Error:", e);
                            }
                        }
                    };

                    if (isEventLoop) {
                        (async () => {
                            // ?�벤???�들?? ??�?무조�??��? 차�?�??�행?�고, ?�난 ???�시 감시??
                            while (window.bleEngineRunCounter === currentRunId) {
                                await executeBleQueue();
                                await new Promise(r => setTimeout(r, 500)); // 중복 ??�� 방�? 쿨다??
                            }
                        })();
                    } else {
                        executeBleQueue();
                    }
                });

            }
            var duration = 3 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };
            function randomInRange(min, max) { return Math.random() * (max - min) + min; }
            var interval = setInterval(function () {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) { return clearInterval(interval); }
                var particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));

            children.forEach(child => {
                if (child.classList.contains('spike-block')) {
                    const action = child.getAttribute('data-action');
                    if (allowed.includes(action)) {
                        child.style.display = ''; // Show

                    badge: 'STAGE 5', title: '급행통로 게이트를 만들어요.', desc: '모터와 센서를 활용하여 손대지 않고 자동으로 열리는 급행통로 게이트를 설계해 봅니다.',
                    pinCode: '5019',
                    tasks: [
                        { id: 'start', text: '재생(시작) 블록 연결하기' },
                        { id: 'event_distance_sensor', text: '거리 센서 감지 활용' },
                        { id: ['motor_cw', 'motor_ccw'], text: '모터 회전 구동 블록 실행' }
                    ]
                }
            };
            const currentMission = missionData[unit];
            if (currentMission) {
                document.getElementById('missionStatusBar').style.display = 'flex';
                document.getElementById('m-badge').textContent = currentMission.badge;
                document.getElementById('m-title').textContent = currentMission.title;
                document.getElementById('m-desc').textContent = currentMission.desc;

                // 퍼센티지 재계산 및 과제 리스트 렌더링용
                const tasksEl = document.getElementById('m-tasks-list');
                tasksEl.innerHTML = '';
                currentMission.tasks.forEach((task, idx) => {
                    const li = document.createElement('li');
                    li.id = 'task-item-' + idx;
                    li.style.cssText = 'display: flex; align-items: center; gap: 10px; font-size: 0.95rem; font-weight: 500; color: #64748b; transition: all 0.3s ease;';
                    li.innerHTML = `<i class="far fa-circle" style="color: #cbd5e1; width:20px; font-size:1.1rem; text-align:center;"></i> ${task.text}`;
                    tasksEl.appendChild(li);
                });

                const updateProgress = () => {
                    // 현재 놓여진 블록들 확인
                    const workspaceBlocks = Array.from(document.querySelectorAll('#workspaceArea .workspace-item:not(.placeholder)'));
                    const presentActions = workspaceBlocks.map(b => b.getAttribute('data-action'));

                    let completedTasks = 0;

                    currentMission.tasks.forEach((task, idx) => {
                        const li = document.getElementById('task-item-' + idx);
                        // 특정 블럭이 존재하는지 정밀 조건 검사
                        let isCompleted = Array.isArray(task.id)
                            ? task.id.some(id => presentActions.includes(id))
                            : presentActions.includes(task.id);

                        if (isCompleted) {
                            completedTasks++;
                            li.style.color = '#10b981';
                            li.innerHTML = `<i class="fas fa-check-circle" style="color: #10b981; width:20px; font-size:1.1rem; text-align:center;"></i> ${task.text}`;
                        } else {
                            li.style.color = '#64748b';
                            li.innerHTML = `<i class="far fa-circle" style="color: #cbd5e1; width:20px; font-size:1.1rem; text-align:center;"></i> ${task.text}`;
                        }
                    });

                    const percent = Math.min(100, Math.round((completedTasks / currentMission.tasks.length) * 100));

                    document.getElementById('m-progress').style.width = percent + '%';
                    document.getElementById('m-percent').textContent = percent + '%';

                    if (percent >= 100 && !document.getElementById('m-progress').dataset.completed) {
                        document.getElementById('m-progress').dataset.completed = 'true';

                        // [추가됨] 사용자가 올려놓은 모터 방향 블록에 따라 동적으로 핀코드(7241 또는 9988) 발급
                        let finalPin = currentMission.pinCode || '0000';
                        const lastMotorAction = presentActions.slice().reverse().find(a => a === 'motor_cw' || a === 'motor_ccw');
                        if (lastMotorAction === 'motor_cw') {
                            finalPin = '7241';
                        } else if (lastMotorAction === 'motor_ccw') {
                            finalPin = '9988';
                        }

                        if (isMissionActive) {
                            setTimeout(() => {
                                showPinCodeModal(finalPin);
                                triggerSuccessConfetti();

                                // 웹소켓을 통해 클리어 신호 전송 로직 (추후 UEFN 연동 용)
                                if (typeof bridgeSocket !== 'undefined' && bridgeSocket && bridgeSocket.readyState === WebSocket.OPEN) {
                                    bridgeSocket.send(JSON.stringify({ action: "MISSION_CLEARED_PIN_READY", pin: finalPin }));
                                }
                            }, 500); // 100% 모션 후 딜레이
                        }
                    } else if (percent < 100) {
                        document.getElementById('m-progress').dataset.completed = ''; // 블럭 떨어져나가면 달성도 리셋
                    }
                };

                const observer = new MutationObserver(updateProgress);
                observer.observe(document.getElementById('workspaceArea'), { childList: true, subtree: true });
                // 초기 계산 1회 수행
                setTimeout(updateProgress, 300);
            }
        }
    </script>

    <!-- Firebase SDK 및 공통 설정 연동 -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="firebase_config.js"></script>

    <script>
        // --- Zero-Latency 별도 페이지 통신 채널 레이더 --- //
        let _bsStudentName = 'Guest_익명';
        try {
            const sessionDataStr = localStorage.getItem('bricksync_student_session');
            if (sessionDataStr) {
                const sessionData = JSON.parse(sessionDataStr);
                if (Date.now() < sessionData.expires) {
                    _bsStudentName = sessionData.name;
                } else {
                    localStorage.removeItem('bricksync_student_session');
                }
            }
        } catch (e) { }

        // Firebase 실시간 온라인 상태 업데이트 및 연결 끊김 감지 설정
        if (typeof isFirebaseOnline !== 'undefined' && isFirebaseOnline && database) {
            try {
                database.ref('bricksync_classroom/students/' + _bsStudentName).update({
                    online: true,
                    lastActive: Date.now()
                });
                database.ref('bricksync_classroom/students/' + _bsStudentName + '/online').onDisconnect().set(false);
                database.ref('bricksync_classroom/students/' + _bsStudentName + '/lastActive').onDisconnect().set(Date.now());

                // Firebase 실시간 DB 리셋 신호 감지 (원격/멀티 디바이스 초기화 연동)
                database.ref('bricksync_classroom/reset_signal').on('value', (snapshot) => {
                    const resetTime = snapshot.val();
                    if (resetTime) {
                        const sessionDataStr = localStorage.getItem('bricksync_student_session');
                        if (sessionDataStr) {
                            const session = JSON.parse(sessionDataStr);
                            const loginTime = session.loginTime || 0;
                            if (resetTime > loginTime) {
                                localStorage.removeItem('bricksync_student_session');
                                window.top.location.href = 'student_login.html';
                            }
                        }
                    }
                });
            } catch (e) {
                console.error("Firebase connection tracking setup failed:", e);
            }
        }

        try {
            window.dashChannel = new BroadcastChannel('bricksync_monitor');
            window.dashChannel.onmessage = function (event) {
                if (event.data && event.data.type === 'RESET_ALL') {
                    localStorage.removeItem('bricksync_student_session');
                    // Clear mission active markers
                    for (let u = 1; u <= 5; u++) {
                        localStorage.removeItem(`bricksync_mission_active_unit_${u}`);
                    }
                    window.top.location.href = 'student_login.html';
                }
            };
        } catch (e) { }

        // 대시보드 꺼짐 대비 백그라운드 영구 누적 저장 로직
        function recordTelemetry(isMotor, msgText, isMissionComplete = false, unitNum = 0) {
            const studentName = _bsStudentName || 'Guest_익명';
            let sLiveBlocks = 0;
            let sCntMotor = 0;
            let sCntSensor = 0;
            let sLiveMinutes = studentName === '김민준' ? 65 : Math.floor(40 + Math.random() * 40);
            let sLiveSuccess = studentName === '김민준' ? 79 : Math.floor(60 + Math.random() * 35);
            let sMissions = [true, true, false];
            let sLogs = [];
            let sAiComment = "대기 중...";

            const raw = localStorage.getItem('dashboard_stats_' + studentName);
            if (raw) {
                try {
                    const parsed = JSON.parse(raw);
                    sLiveBlocks = parsed.liveBlocks || 0;
                    sCntMotor = parsed.cntMotor || 0;
                    sCntSensor = parsed.cntSensor || 0;
                    sLiveMinutes = parsed.liveMinutes || 0;
                    sLiveSuccess = parsed.liveSuccess || 100;
                    sMissions = parsed.missions || [true, true, false];
                    sLogs = parsed.logs || [];
                    sAiComment = parsed.aiComment || "대기 중...";
                } catch (e) { }
            }

            const now = new Date();
            const timeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;

            if (isMissionComplete) {
                const unitIdx = parseInt(unitNum) - 1;
                if (unitIdx >= 0 && unitIdx < 3) {
                    sMissions[unitIdx] = true;
                }
            } else {
                sLiveBlocks++;
                if (isMotor) {
                    sCntMotor++;
                } else {
                    sCntSensor++;
                }
            }

            sLogs.unshift({ time: timeStr, msg: msgText });
            if (sLogs.length > 20) sLogs.pop();

            if (sLiveBlocks > 0) {
                sAiComment = `${studentName} 학생은 오늘 총 <b>${sLiveBlocks}번의 코딩 시도</b>를 스스로 진행하며 적극적인 학습 태도를 보여주었습니다. `;
                if (sCntMotor > sCntSensor * 2) {
                    sAiComment += `주로 <b>[물리 모터 제어]</b>에 강한 흥미를 보였으며 눈앞에서 포트나이트 장치가 직접 움직이는 결과물을 도출하는 데 탁월한 집중력을 보였습니다. `;
                } else if (sCntSensor > sCntMotor * 1.5) {
                    sAiComment += `오늘은 동작보다는 <b>[센서 입력 및 제어 흐름 설계]</b>를 심도 있게 테스트했습니다. 문제의 구조를 먼저 설계하려는 분석적인 성향이 돋보였습니다. `;
                } else {
                    sAiComment += `단일 기능에 치우치지 않고 <b>[모터와 센서 로직을 균형 있게 융합]</b>하여 구조적으로 코딩을 조합해내는 훌륭한 응용력을 보여주었습니다. `;
                }
                if (sLiveBlocks > 10) {
                    sAiComment += `다음 수업에서는 한 단계 높은 [대관람차 다중 회전 미션]에 도전해볼 것을 추천합니다!`;
                } else {
                    sAiComment += `앞으로 더욱 다양한 블록을 조합해보며 자신감을 키워갈 수 있도록 이끌겠습니다.`;
                }
            }

            let existingData = {};
            try {
                const storedRaw = localStorage.getItem('dashboard_stats_' + studentName);
                if (storedRaw) existingData = JSON.parse(storedRaw);
            } catch (e) { }

            const updatedData = Object.assign({}, existingData, {
                liveBlocks: sLiveBlocks,
                cntMotor: sCntMotor,
                cntSensor: sCntSensor,
                liveMinutes: sLiveMinutes,
                liveSuccess: sLiveSuccess,
                missions: sMissions,
                logs: sLogs,
                aiComment: sAiComment
            });
            localStorage.setItem('dashboard_stats_' + studentName, JSON.stringify(updatedData));

            // Firebase 실시간 DB 업로드 (학생 텔레메트리 전송)
            if (typeof isFirebaseOnline !== 'undefined' && isFirebaseOnline && database) {
                try {
                    database.ref('bricksync_classroom/students/' + studentName).update({
                        online: true,
                        lastActive: Date.now(),
                        stats: updatedData
                    });
                } catch (e) {
                    console.error("Firebase telemetry update failed:", e);
                }
            }

            if (window.dashChannel) {
                try {
                    window.dashChannel.postMessage({
                        type: isMissionComplete ? 'MISSION_COMPLETE' : (isMotor ? 'ACTION' : 'SENSOR'),
                        msg: msgText,
                        unit: unitNum,
                        student: studentName
                    });
                } catch (e) { }
            }
        }

        // 1분 간격으로 하트비트 신호를 직접 저장하고 연동
        setInterval(() => {
            const studentName = _bsStudentName || 'Guest_익명';
            let sLiveBlocks = 0;
            let sCntMotor = 0;
            let sCntSensor = 0;
            let sLiveMinutes = studentName === '김민준' ? 65 : Math.floor(40 + Math.random() * 40);
            let sLiveSuccess = studentName === '김민준' ? 79 : Math.floor(60 + Math.random() * 35);
            let sMissions = [true, true, false];
            let sLogs = [];
            let sAiComment = "대기 중...";

            const raw = localStorage.getItem('dashboard_stats_' + studentName);
            if (raw) {
                try {
                    const parsed = JSON.parse(raw);
                    sLiveBlocks = parsed.liveBlocks || 0;
                    sCntMotor = parsed.cntMotor || 0;
                    sCntSensor = parsed.cntSensor || 0;
                    sLiveMinutes = parsed.liveMinutes || 0;
                    sLiveSuccess = parsed.liveSuccess || 100;
                    sMissions = parsed.missions || [true, true, false];
                    sLogs = parsed.logs || [];
                    sAiComment = parsed.aiComment || "대기 중...";
                } catch (e) { }
            }

            sLiveMinutes += 1;

            let existingData = {};
            try {
                const storedRaw = localStorage.getItem('dashboard_stats_' + studentName);
                if (storedRaw) existingData = JSON.parse(storedRaw);
            } catch (e) { }

            const updatedData = Object.assign({}, existingData, {
                liveBlocks: sLiveBlocks,
                cntMotor: sCntMotor,
                cntSensor: sCntSensor,
                liveMinutes: sLiveMinutes,
                liveSuccess: sLiveSuccess,
                missions: sMissions,
                logs: sLogs,
                aiComment: sAiComment
            });
            localStorage.setItem('dashboard_stats_' + studentName, JSON.stringify(updatedData));

            // Firebase 실시간 DB 업로드 (하트비트 갱신)
            if (typeof isFirebaseOnline !== 'undefined' && isFirebaseOnline && database) {
                try {
                    database.ref('bricksync_classroom/students/' + studentName).update({
                        online: true,
                        lastActive: Date.now(),
                        stats: updatedData
                    });
                } catch (e) {
                    console.error("Firebase heartbeat update failed:", e);
                }
            }

            if (window.dashChannel) {
                try {
                    window.dashChannel.postMessage({
                        type: 'HEARTBEAT',
                        msg: `[${studentName}] 하트비트: 집중 학습 중`,
                        student: studentName
                    });
                } catch (e) { }
            }
        }, 60000);

        // 엔진 개조 방지: 무전 채널 및 로컬스토리지 누적 (중복 방지 및 실제 조작만 수집)
        let lastTelemetryTime = 0;
        document.addEventListener('pointerup', (e) => {
            const now = Date.now();
            if (now - lastTelemetryTime < 50) return; // 50ms 디바운스

            let isMotor = false;
            let shouldRecord = false;
            try {
                if (e.target && e.target.closest) {
                    const block = e.target.closest('.workspace-item') || e.target.closest('.spike-block');
                    const runBtn = e.target.closest('.run-btn');
                    if (runBtn) {
                        isMotor = true;
                        shouldRecord = true;
                        lastTelemetryTime = now;
                    } else if (block) {
                        const action = block.getAttribute('data-action') || '';
                        if (action.includes('motor') || action.includes('move') || action.includes('matrix') || block.classList.contains('bg-pink') || action === 'start') {
                            isMotor = true;
                        }
                        shouldRecord = true;
                        lastTelemetryTime = now;
                    }
                }
            } catch (err) { }

            if (shouldRecord) {
                recordTelemetry(isMotor, `[${_bsStudentName}] 이벤트 감지: UI 조작 및 블록 제어 트리거 됨`);
            }
        });

        // --- Workspace Auto-Save / Auto-Load System ---
        function saveWorkspace() {
            if (!unit) return;
            const workspaceArea = document.getElementById('workspaceArea');
            if (!workspaceArea) return;

            const stacks = [];
            const stackEls = workspaceArea.querySelectorAll('.block-stack');

            stackEls.forEach(stack => {
                const blocks = [];

                function serializeBlock(block) {
                    if (block.classList.contains('placeholder')) return null;
                    const action = block.getAttribute('data-action');
                    if (!action) return null;

                    const blockData = { action: action };

                    const paramEl = block.querySelector(':scope > .block-param:not(.param-time)') || block.querySelector('.color-brick-icon');
                    if (paramEl) {
                        blockData.paramVal = paramEl.hasAttribute('data-val') ? paramEl.getAttribute('data-val') : paramEl.innerText.trim();
                        if (paramEl.hasAttribute('data-matrix')) {
                            blockData.matrix = paramEl.getAttribute('data-matrix');
                        }
                    }

                    const timeEl = block.querySelector(':scope > .param-time') || block.querySelector('.block-param.param-time');
                    if (timeEl) {
                        blockData.timeVal = timeEl.hasAttribute('data-val') ? timeEl.getAttribute('data-val') : timeEl.innerText.trim();
                    }

                    const innerStack = block.querySelector('.loop-inner-stack');
                    if (innerStack) {
                        const nested = [];
                        Array.from(innerStack.children).forEach(child => {
                            if (child.classList.contains('workspace-item')) {
                                const serialized = serializeBlock(child);
                                if (serialized) nested.push(serialized);
                            }
                        });
                        blockData.nested = nested;
                    }

                    return blockData;
                }

                Array.from(stack.children).forEach(child => {
                    if (child.classList.contains('workspace-item')) {
                        const serialized = serializeBlock(child);
                        if (serialized) blocks.push(serialized);
                    }
                });

                if (blocks.length > 0) {
                    stacks.push({
                        left: parseFloat(stack.style.left) || 0,
                        top: parseFloat(stack.style.top) || 0,
                        blocks: blocks
                    });
                }
            });

            const projectId = _bsStudentName + '_project_unit_' + unit;

            if (stacks.length === 0) {
                localStorage.removeItem(projectId);
                return;
            }

            const projectNames = {
                '1': '학습 1: 요리조리 기울여서 탐험보트를 출발시켜요',
                '2': '학습 2: 바닷속 잠수함으로 바다를 탐험해요',
                '3': '학습 3: 모터를 돌려 빙글빙글 대관람차를 태워줘요',
                '4': '학습 4: 동굴자동차를 타고 여행해요',
                '5': '학습 5: 급행통로 게이트를 만들어요'
            };

            const projectData = {
                id: projectId,
                name: projectNames[unit] || `학습 ${unit} 프로젝트`,
                unit: unit,
                blocks: stacks,
                updatedAt: Date.now()
            };

            localStorage.setItem(projectId, JSON.stringify(projectData));
        }

        function loadWorkspace() {
            if (!unit) return;
            const projectId = _bsStudentName + '_project_unit_' + unit;
            const rawData = localStorage.getItem(projectId);
            if (!rawData) return;

            const workspaceArea = document.getElementById('workspaceArea');
            if (!workspaceArea) return;

            const stacks = workspaceArea.querySelectorAll('.block-stack');
            stacks.forEach(s => s.remove());
            const hint = workspaceArea.querySelector('.hint-text');
            if (hint) hint.remove();

            try {
                const projectData = JSON.parse(rawData);
                if (!projectData || !projectData.blocks) return;

                projectData.blocks.forEach(stackData => {
                    const newStack = document.createElement('div');
                    newStack.className = 'block-stack';
                    newStack.style.left = stackData.left + 'px';
                    newStack.style.top = stackData.top + 'px';
                    workspaceArea.appendChild(newStack);

                    function deserializeBlock(blockData, parentNode) {
                        const template = document.querySelector(`#palette [data-action="${blockData.action}"]`);
                        if (!template) return null;

                        const block = template.cloneNode(true);
                        block.classList.add('workspace-item');

                        if (blockData.paramVal !== undefined) {
                            const paramEl = block.querySelector(':scope > .block-param:not(.param-time)') || block.querySelector('.color-brick-icon');
                            if (paramEl) {
                                paramEl.setAttribute('data-val', blockData.paramVal);
                                if (paramEl.classList.contains('color-brick-icon')) {
                                    const colorsMap = {
                                        '0': '#000000', '1': '#c084fc', '2': '#3b82f6', '3': '#2dd4bf',
                                        '4': '#10b981', '5': '#fbbf24', '6': '#fb923c', '7': '#ef4444',
                                        '8': '#f472b6', '9': '#ffffff', '10': '#64748b'
                                    };
                                    paramEl.style.backgroundColor = colorsMap[blockData.paramVal] || '#ef4444';
                                    const dropEl = block.querySelector('.block-param');
                                    if (dropEl) dropEl.setAttribute('data-val', blockData.paramVal);
                                } else {
                                    paramEl.innerText = blockData.paramVal;
                                }
                            }
                        }

                        if (blockData.matrix !== undefined) {
                            const paramEl = block.querySelector('.param-unified') || block.querySelector('.block-param:not(.param-time)');
                            if (paramEl) {
                                paramEl.setAttribute('data-matrix', blockData.matrix);
                            }
                        }

                        if (blockData.timeVal !== undefined) {
                            const timeEl = block.querySelector(':scope > .param-time') || block.querySelector('.block-param.param-time');
                            if (timeEl) {
                                timeEl.setAttribute('data-val', blockData.timeVal);
                                timeEl.innerText = blockData.timeVal;
                            }
                        }

                        if (blockData.nested && blockData.nested.length > 0) {
                            const innerStack = block.querySelector('.loop-inner-stack');
                            if (innerStack) {
                                blockData.nested.forEach(nestedData => {
                                    deserializeBlock(nestedData, innerStack);
                                });
                            }
                        }

                        parentNode.appendChild(block);
                        return block;
                    }

                    stackData.blocks.forEach(blockData => {
                        deserializeBlock(blockData, newStack);
                    });
                });
            } catch (e) {
                console.error("Workspace restore error:", e);
            }
        }

        // Initialize Auto-Save Mutator
        const workspaceObserver = new MutationObserver(() => {
            saveWorkspace();
        });
        const workspaceEl = document.getElementById('workspaceArea');
        if (workspaceEl) {
            workspaceObserver.observe(workspaceEl, { childList: true, subtree: true, attributes: true, attributeFilter: ['data-val', 'data-matrix'] });
        }

        // 툴박스(팔레트) 마우스 드래그 및 휠 가로 스크롤 구현
        function setupPaletteScroll() {
            const paletteEl = document.getElementById('palette');
            if (!paletteEl) return;

            let isDown = false;
            let startX;
            let scrollLeft;

            paletteEl.addEventListener('wheel', (e) => {
                if (e.deltaY !== 0) {
                    e.preventDefault();
                    paletteEl.scrollLeft += e.deltaY;
                }
            }, { passive: false });

            paletteEl.addEventListener('mousedown', (e) => {
                if (e.target.closest('[draggable="true"]')) return;
                isDown = true;
                paletteEl.style.cursor = 'grabbing';
                startX = e.pageX - paletteEl.offsetLeft;
                scrollLeft = paletteEl.scrollLeft;
            });

            paletteEl.addEventListener('mouseleave', () => {
                isDown = false;
                paletteEl.style.cursor = '';
            });

            paletteEl.addEventListener('mouseup', () => {
                isDown = false;
                paletteEl.style.cursor = '';
            });

            paletteEl.addEventListener('mousemove', (e) => {
                if (!isDown) return;
                e.preventDefault();
                const x = e.pageX - paletteEl.offsetLeft;
                const walk = (x - startX) * 1.5;
                paletteEl.scrollLeft = scrollLeft - walk;
            });
        }

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                loadWorkspace();
            }, 200);
            setupPaletteScroll();
        });
    </script>
